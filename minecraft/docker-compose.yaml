# Generated by setupmc.com on 2026-03-24T17:19:57.758Z

services:
  mc:
    # Changed from :latest to :java25 to meet the 69.0 class file requirement
    image: itzg/minecraft-server:java25 
    container_name: minecraft-702
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      WHITELIST_ENABLED: "TRUE"
      WHITELIST: "NinjaLlama04,letienne212,Roflcopterz327,asharahmad,NaturalestD,Jumbo_Joe4"
      MEMORY: "4096M"
      MAX_PLAYERS: "10"
      MOTD: "§o§aLukas'§r§6 Server - §l§e 702 King Edward"
      USE_AIKAR_FLAGS: "true"
      USE_MEOWICE_FLAGS: "true"
      TZ: "America/Vancouver"
    volumes:
      - "./data:/data"
